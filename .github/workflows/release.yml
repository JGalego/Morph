name: Release

# NOTE: this workflow has not been executed against real GitHub-hosted
# runners in the environment this project was built in (no way to trigger
# a tag push/CI run from there) — see docs/ROADMAP.md. It follows the
# standard cross-compiled-Rust-CLI release pattern; verify it once before
# relying on it for a real release.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: morph-linux-x86_64.tar.gz
            use_musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: morph-linux-aarch64.tar.gz
            use_musl: true
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: morph-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: morph-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: morph-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.use_musl && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }} -p morph-cli

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p morph-cli

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp morph.example.toml target/${{ matrix.target }}/release/morph.example.toml
          tar -czf ${{ matrix.asset }} -C target/${{ matrix.target }}/release morph morph.example.toml

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item morph.example.toml target/${{ matrix.target }}/release/morph.example.toml
          Compress-Archive -Path target/${{ matrix.target }}/release/morph.exe, target/${{ matrix.target }}/release/morph.example.toml -DestinationPath ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/jgalego/morph
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
