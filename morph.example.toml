listen = "0.0.0.0:8080"
mode = "auto"
default_provider = "openai"
theme = "dark"
cache = true
stream = true
metrics = true

[providers.openai]
kind = "openai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
passthrough_auth = false

[auth]
enabled = false
api_keys = []

[rate_limit]
enabled = false
requests_per_minute = 600

[render]
min_tokens_for_rendering = 120
allow_code_as_image = false

[plugins]
enabled = false
dir = "./plugins"

[logging]
log_prompts = false
json = true

[inspector]
enabled = false
max_events = 50

[retry]
enabled = true
max_retries = 2
initial_backoff_ms = 500
max_backoff_ms = 8000

# Only needed for `morph -- <command>` against a client whose base-URL/
# credential env vars aren't in the built-in set (Anthropic, OpenAI, Ollama).
[exec]
extra_base_url_env_vars = []
extra_clear_env_vars = []
